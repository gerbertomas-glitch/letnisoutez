                    if (sourceCurrency === 'EUR') {
                        return formatMoney((val || 0) * 25, 'CZK');
                    }
                    return formatMoney(Math.round((val || 0) / 25), 'EUR');

                        const commNative = data.turnover * (tierInfo.rate / 100);
                        const commCZK = getValInCZK(commNative, rep.currency);

                        if (commCZK > topCommissionCZK) {

                            topCommRep = { ...rep, amountNative: commNative, rate: tierInfo.rate };
                        }

                        if (data.newClients > topHunterValue) {

                            topHunterRep = rep;
                        }

                    return {

                        totalEUR: Math.round(totalCZK / 25),

                        topHunterRep,
                        topHunterValue,
                        avgComm

                        const obratB = getValInCZK(b[activeMonth]?.turnover || 0, b.currency);

                    const isBronzActive = currentTurnover < limits.bronz;
                    const bronzProgress = Math.min((currentTurnover / limits.bronz) * 100, 100);
                    const bronzMissing = limits.bronz - currentTurnover;

                    // 2. Stříbro Milník
                    const stribroLimit = limits.stribro || Math.round((limits.bronz + limits.zlato) / 2);
                    const isStribroCompleted = currentTurnover >= stribroLimit;
                    const isStribroActive = currentTurnover >= limits.bronz && currentTurnover < stribroLimit;
                    let stribroProgress = 0;
                    if (isStribroCompleted) stribroProgress = 100;
                    else if (isStribroActive) stribroProgress = ((currentTurnover - limits.bronz) / (stribroLimit - limits.bronz)) * 100;
                    const stribroMissing = stribroLimit - currentTurnover;

                    // 3. Zlato Milník
                    const isZlatoCompleted = currentTurnover >= limits.zlato;
                    const isZlatoActive = currentTurnover >= stribroLimit && currentTurnover < limits.zlato;
                    let zlatoProgress = 0;
                    if (isZlatoCompleted) zlatoProgress = 100;
                    else if (isZlatoActive) zlatoProgress = ((currentTurnover - stribroLimit) / (limits.zlato - stribroLimit)) * 100;
                    const zlatoMissing = limits.zlato - currentTurnover;

                        turnover: currentTurnover,
                        isSimulating: simulatedTurnovers[activeMerchant.id] !== undefined,
                        tierInfo,
                        limits: { ...limits, stribro: stribroLimit },
                        bronz: { completed: isBronzCompleted, active: isBronzActive, progress: bronzProgress, missing: bronzMissing },
                        stribro: { completed: isStribroCompleted, active: isStribroActive, progress: stribroProgress, missing: stribroMissing },

                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Přístupový PIN</label>
                                            <input type="password" id="admin-pin-input" placeholder="••••" maxLength="8" value={adminPin} onChange={(e) => setAdminPin(e.target.value)} className="w-full text-center text-2xl tracking-widest p-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500" />
                                        </div>
                                        {pinError && <div className="text-red-500 text-xs text-center font-bold">{pinError}</div>}
                                        <div className="flex gap-2 pt-2">
                                            <button type="button" onClick={() => setShowPinModal(false)} className="w-1/2 p-3 border border-slate-200 text-slate-500 rounded-2xl text-xs font-bold hover:bg-slate-50 transition-all">Storno</button>
                                            <button type="submit" className="w-1/2 p-3 bg-slate-950 hover:bg-slate-800 text-white rounded-2xl text-xs font-bold transition-all shadow-sm">Ověřit</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* MODAL: RYCHLÁ ADMINISTRACE */}
                        {isAdmin && (
                            <div className="fixed inset-0 z-40 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-hidden border border-slate-100 shadow-2xl flex flex-col">
                                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                        <div>
                                            <h2 className="text-lg font-extrabold text-slate-900 flex items-center gap-2">
                                                <Icons.Settings /> Rychlá administrace
                                            </h2>
                                            <p className="text-xs text-slate-500">
                                                Upravujete výsledky pro měsíc: <strong className="text-orange-600 uppercase">{activeMonth === 'july' ? 'Červenec' : 'Srpen'}</strong>
                                            </p>
                                        </div>
                                        <button onClick={() => setIsAdmin(false)} className="bg-slate-200 hover:bg-slate-300 text-slate-700 p-2 rounded-xl transition-all">
                                            <Icons.X />
                                        </button>
                                    </div>

                                    <div className="p-6 overflow-y-auto flex-1 grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {/* LEVÝ SLOUPEC: RYCHLÁ ÚPRAVA OBCHODNÍKA */}
                                        <div className="space-y-4 border-r border-slate-100 pr-0 md:pr-6">
                                            <div className="flex items-center gap-2 border-b border-slate-100 pb-2">
                                                <span className="w-5 h-5 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center text-xs font-bold">1</span>
                                                <h3 className="text-sm font-extrabold text-slate-800">Uložit výsledky obchodníka</h3>
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Vyberte člena týmu</label>
                                                <select value={adminActiveRepId} onChange={(e) => setAdminActiveRepId(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl text-sm font-bold bg-slate-50 focus:ring-2 focus:ring-orange-500/20">
                                                    {salesReps.map(m => (
                                                        <option key={m.id} value={m.id}>{m.name} [{m.currency}]</option>
                                                    ))}
                                                </select>
                                            </div>

                                            {/* Volba měny aktivního obchodníka */}
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Nastavení měny</label>
                                                <div className="flex gap-2">
                                                    <label className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-xl flex items-center justify-center gap-1.5 cursor-pointer text-xs font-bold">
                                                        <input type="radio" name="admin-opt-currency" value="CZK" id="admin-currency-czk" checked={adminRepCurrency === 'CZK'} onChange={() => changeAdminMerchantCurrency('CZK')} className="accent-orange-500" /> Kč (CZK)
                                                    </label>
                                                    <label className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-xl flex items-center justify-center gap-1.5 cursor-pointer text-xs font-bold">
                                                        <input type="radio" name="admin-opt-currency" value="EUR" id="admin-currency-eur" checked={adminRepCurrency === 'EUR'} onChange={() => changeAdminMerchantCurrency('EUR')} className="accent-orange-500" /> € (EUR)
                                                    </label>
                                                </div>
                                            </div>

                                            {/* Výsledky vybraného obchodníka */}
                                            <div className="space-y-4 pt-2">
                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block" id="admin-label-turnover">Aktuální obrat</label>
                                                    <div className="flex gap-2">
                                                        <input type="number" value={adminRepObrat} onChange={(e) => setAdminRepObrat(e.target.value)} className="flex-1 p-2.5 border border-slate-200 rounded-xl text-sm font-black focus:ring-2 focus:ring-orange-500/20" />
                                                        <div id="admin-quick-turnover-buttons" className="flex gap-2">
                                                            {adminRepCurrency === 'EUR' ? (
                                                                <React.Fragment>
                                                                    <button type="button" onClick={() => addToAdminObrat(500)} className="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold px-3 py-2 rounded-xl text-xs transition-all">+ 500 €</button>
                                                                    <button type="button" onClick={() => addToAdminObrat(2000)} className="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold px-3 py-2 rounded-xl text-xs transition-all">+ 2k €</button>
                                                                </React.Fragment>
                                                            ) : (
                                                                <React.Fragment>
                                                                    <button type="button" onClick={() => addToAdminObrat(10000)} className="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold px-3 py-2 rounded-xl text-xs transition-all">+ 10k Kč</button>
                                                                    <button type="button" onClick={() => addToAdminObrat(50000)} className="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold px-3 py-2 rounded-xl text-xs transition-all">+ 50k Kč</button>
                                                                </React.Fragment>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Počet nových klientů (ks)</label>
                                                    <div className="flex items-center gap-2">
                                                        <button type="button" onClick={() => adjustAdminClients(-1)} className="bg-slate-100 hover:bg-slate-200 text-slate-800 font-black w-10 h-10 rounded-xl">-</button>
                                                        <input type="number" value={adminRepClients} onChange={(e) => setAdminRepClients(Number(e.target.value))} className="flex-1 p-2.5 border border-slate-200 rounded-xl text-sm font-black text-center focus:ring-2 focus:ring-orange-500/20" />
                                                        <button type="button" onClick={() => adjustAdminClients(1)} className="bg-slate-100 hover:bg-slate-200 text-slate-800 font-black w-10 h-10 rounded-xl transition-all">+</button>
                                                    </div>
                                                </div>

                                                {/* Nastavení limitů */}
                                                <div className="pt-2 border-t border-slate-100">
                                                    <button type="button" onClick={() => setShowAdvancedAdminLimits(!showAdvancedAdminLimits)} className="text-xs text-slate-500 hover:text-slate-800 font-bold flex items-center gap-1">
                                                        <Icons.ChevronDown /> 
                                                        Chci změnit nastavené limity (IP cíle)
                                                    </button>
                                                    {showAdvancedAdminLimits && (
                                                        <div className="mt-3 p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3">
                                                            <div className="grid grid-cols-2 gap-3">
                                                                <div className="space-y-1">
                                                                    <label className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block" id="admin-label-bronz">Limit Bronz</label>
                                                                    <input type="number" value={adminRepBronz} onChange={(e) => setAdminRepBronz(e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-xs font-semibold bg-white" />
                                                                </div>
                                                                <div className="space-y-1">
                                                                    <label className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block" id="admin-label-zlato">Limit Zlato</label>
                                                                    <input type="number" value={adminRepZlato} onChange={(e) => setAdminRepZlato(e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-xs font-semibold bg-white" />
                                                                </div>
                                                            </div>
                                                            <p className="text-[9px] text-slate-400 leading-normal">Stříbrný limit se vypočítá automaticky jako střed mezi Bronzem a Zlatem.</p>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="pt-2">
                                                    <button onClick={saveAdminMerchant} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold p-3 rounded-2xl text-xs shadow-md shadow-emerald-500/10 transition-all flex items-center justify-center gap-1.5">
                                                        <Icons.Check /> Uložit výsledky obchodníka
                                                    </button>
                                                </div>
                                            </div>

                                            <div className="pt-4 border-t border-slate-100 flex justify-between">
                                                <button onClick={() => setShowAddMerchantModal(true)} className="text-xs font-extrabold text-orange-600 bg-orange-50 hover:bg-orange-100 px-3 py-2 rounded-xl transition-all flex items-center gap-1">
                                                    <Icons.Plus /> Nový člověk
                                                </button>
                                                <button onClick={deleteSelectedMerchant} className="text-xs font-extrabold text-red-500 bg-red-50 hover:bg-red-100 px-3 py-2 rounded-xl transition-all flex items-center gap-1">
                                                    <Icons.Trash /> Smazat obchodníka
                                                </button>
                                            </div>
                                        </div>

                                        {/* PRAVÝ SLOUPEC: SOUŤEŽ TÝDNŮ */}
                                        <div className="space-y-4">
                                            <div className="flex items-center gap-2 border-b border-slate-100 pb-2">
                                                <span className="w-5 h-5 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center text-xs font-bold">2</span>
                                                <h3 className="text-sm font-extrabold text-slate-800">Vyhodnotit týdenní soutěž</h3>
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Vyberte týden</label>
                                                <select value={adminActiveWeekNum} onChange={(e) => setAdminActiveWeekNum(Number(e.target.value))} className="w-full p-2.5 border border-slate-200 rounded-xl text-sm bg-white font-bold text-slate-800">
                                                    {weeklyChallenges.map(w => (
                                                        <option key={w.week} value={w.week}>Týden {w.week} ({w.dateRange})</option>
                                                    ))}
                                                </select>
                                            </div>

                                            {/* Detail týdne pro nastavení výsledku */}
                                            <div id="admin-week-detail-container" className="space-y-4 pt-2">
                                                <div className="bg-slate-50 border border-slate-100 rounded-3xl p-5 space-y-4">
                                                    <div className="flex justify-between items-center pb-2 border-b border-slate-200">
                                                        <span className="text-xs font-black text-slate-800">Týdenní status</span>
                                                        <div className="flex items-center gap-1.5">
                                                            <input type="checkbox" id="admin-complete-field" checked={adminWeekCompleted} onChange={(e) => setAdminWeekCompleted(e.target.checked)} className="rounded text-orange-500 focus:ring-orange-500 w-4 h-4 cursor-pointer" />
                                                            <label className="text-[10px] font-black text-slate-500 cursor-pointer" htmlFor="admin-complete-field">TÝDEN JE VYHODNOCEN</label>
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs font-semibold">
                                                        <div className="space-y-1">
                                                            <label className="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider block">{adminWeekCompleted ? 'Vítěz týdne:' : 'Průběžný lídr:'}</label>
                                                            <select value={adminWeekWinner} onChange={(e) => setAdminWeekWinner(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl text-xs bg-white font-bold text-slate-800">
                                                                <option value="">-- Vyberte --</option>
                                                                {salesReps.map(m => (
                                                                    <option key={m.id} value={m.id}>{m.name} [{m.currency}]</option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                        <div className="space-y-1">
                                                            <label className="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider block">Počet nově získaných klientů:</label>
                                                            <input type="number" value={adminWeekClients} onChange={(e) => setAdminWeekClients(Number(e.target.value))} className="w-full p-2.5 border border-slate-200 rounded-xl text-xs text-center font-black bg-white" />
                                                        </div>
                                                        <div className="space-y-1">
                                                            <label className="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider block">Tie-breaker obrat:</label>
                                                            <input type="number" id="admin-week-turnover-field" value={adminWeekObrat} onChange={(e) => setAdminWeekObrat(Number(e.target.value))} className="w-full p-2.5 border border-slate-200 rounded-xl text-xs text-center font-black bg-white" />
                                                        </div>
                                                    </div>

                                                    <div className="pt-2 text-right">
                                                        <button onClick={saveAdminWeekData} className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-5 py-2.5 rounded-xl text-xs shadow-md shadow-emerald-500/10 transition-all">
                                                            Uložit výsledky týdne {adminActiveWeekNum}
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL: PŘIDÁNÍ NOVÉHO OBCHODNÍKA */}
                        {showAddMerchantModal && (
                            <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl p-6 max-w-xl w-full border border-slate-100 shadow-2xl space-y-6">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                        <h3 className="text-base font-extrabold text-slate-900 flex items-center gap-2">
                                            <i className="text-orange-500"><Icons.Plus /></i> Nový obchodník do soutěže
                                        </h3>
                                        <button onClick={() => setShowAddMerchantModal(false)} className="text-slate-400 hover:text-slate-600 p-1 rounded-lg">
                                            <Icons.X />
                                        </button>
                                    </div>

                                    <form onSubmit={createNewMerchant} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1 col-span-2 sm:col-span-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Celé jméno</label>
                                                <input type="text" value={newMerchantName} onChange={(e) => setNewMerchantName(e.target.value)} required placeholder="např. Roman Novotný" className="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500/20" />
                                            </div>
                                            <div className="space-y-1 col-span-2 sm:col-span-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Výchozí měna</label>
                                                <div className="flex gap-2">
                                                    <label className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-xl flex items-center justify-center gap-1.5 cursor-pointer text-xs font-bold">
                                                        <input type="radio" name="add-merchant-currency" value="CZK" checked={addMerchantCurrency === 'CZK'} onChange={() => handleAddMerchantCurrencyChange('CZK')} className="accent-orange-500" /> Kč (CZK)
                                                    </label>
                                                    <label className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-xl flex items-center justify-center gap-1.5 cursor-pointer text-xs font-bold">
                                                        <input type="radio" name="add-merchant-currency" value="EUR" checked={addMerchantCurrency === 'EUR'} onChange={() => handleAddMerchantCurrencyChange('EUR')} className="accent-orange-500" /> € (EUR)
                                                    </label>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-4 bg-orange-50/40 border border-orange-100 rounded-2xl space-y-3">
                                            <h4 className="text-xs font-extrabold text-orange-800 uppercase tracking-wider">Základní plán: Červenec 2026</h4>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-bold text-slate-500" id="add-label-july-bronz">IP Bronz</label>
                                                    <input type="number" value={addJulyBronz} onChange={(e) => setAddJulyBronz(e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-xs font-semibold" />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-bold text-slate-500" id="add-label-july-zlato">IP Zlato</label>
                                                    <input type="number" value={addJulyZlato} onChange={(e) => setAddJulyZlato(e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-xs font-semibold" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-4 bg-slate-50 border border-slate-100 rounded-2xl space-y-3">
                                            <h4 className="text-xs font-extrabold text-slate-800 uppercase tracking-wider">Základní plán: Srpen 2026</h4>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-bold text-slate-500" id="add-label-august-bronz">IP Bronz</label>
                                                    <input type="number" value={addAugustBronz} onChange={(e) => setAddAugustBronz(e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-xs font-semibold" />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-bold text-slate-500" id="add-label-august-zlato">IP Zlato</label>
                                                    <input type="number" value={addAugustZlato} onChange={(e) => setAddAugustZlato(e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-xs font-semibold" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex gap-2 justify-end pt-3 border-t border-slate-100">
                                            <button type="button" onClick={() => setShowAddMerchantModal(false)} className="px-5 py-2.5 border border-slate-200 text-slate-500 rounded-xl text-xs font-bold hover:bg-slate-50 transition-all">Storno</button>
                                            <button type="submit" className="px-5 py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded-xl text-xs font-bold shadow-md shadow-orange-500/10 transition-all">Vytvořit</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* MODAL: POTVRZENÍ SMAZÁNÍ */}
                        {repToDeleteId && (
                            <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl p-6 max-w-sm w-full border border-slate-100 shadow-2xl text-center space-y-5">
                                    <div className="w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto">
                                        <Icons.Trash />
                                    </div>
                                    <div>
                                        <h3 className="text-base font-extrabold text-slate-900">Opravdu smazat?</h3>
                                        <p className="text-slate-500 text-xs mt-1.5 leading-relaxed">
                                            Tato akce trvale odstraní obchodníka <strong>{salesReps.find(x => x.id === repToDeleteId)?.name}</strong> z obou měsíců a vymaže veškeré jeho výsledky.
                                        </p>
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => setRepToDeleteId(null)} className="w-1/2 p-3 border border-slate-200 text-slate-500 rounded-2xl text-xs font-bold hover:bg-slate-50 transition-all">Zpět</button>
                                        <button onClick={executeDeleteMerchant} className="w-1/2 p-3 bg-red-500 hover:bg-red-600 text-white rounded-2xl text-xs font-bold shadow-md shadow-red-500/10 transition-all">Trvale odstranit</button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        if (window.FirebaseServices) {
            renderApp();
        } else {
            window.addEventListener('firebaseReady', renderApp);
        }
    </script>
</body>
</html>
