/* ============ STORAGE: FIREBASE FIRESTORE (sdílené pro celý tým) + lokální záloha ============ */
let FB = null;          // Firebase služby
let fbDocRef = null;    // odkaz na sdílený dokument
let fbUnsub = null;     // odhlášení real-time posluchače
let lastLocalWrite = 0; // ochrana proti přepsání vlastních čerstvých změn

function localBackupSave(){
  try{
    localStorage.setItem(STORAGE_KEY_REPS, JSON.stringify(state.reps));
    localStorage.setItem(STORAGE_KEY_WEEKS, JSON.stringify(state.weeks));
    localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(state.settings));
  }catch(e){}
}
function localBackupLoad(){
  try{
    const r = localStorage.getItem(STORAGE_KEY_REPS);
    const w = localStorage.getItem(STORAGE_KEY_WEEKS);
    const st = localStorage.getItem(STORAGE_KEY_SETTINGS);
    if(r) state.reps = JSON.parse(r);
    if(w) state.weeks = JSON.parse(w);
    if(st) state.settings = Object.assign(defaultSettings(), JSON.parse(st));
  }catch(e){}
}

function applyRemoteData(data){
  if(!data) return;
  if(Array.isArray(data.reps)) state.reps = data.reps;
  if(Array.isArray(data.weeks)) state.weeks = data.weeks;
  if(data.settings) state.settings = Object.assign(defaultSettings(), data.settings);
  if(!state.selectedRepId || !repById(state.selectedRepId)){
    state.selectedRepId = state.reps[0] ? state.reps[0].id : null;
  }
  localBackupSave();
}

function waitForFirebase(timeoutMs){
  return new Promise(resolve => {
    if('FirebaseServices' in window) return resolve(window.FirebaseServices);
    const timer = setTimeout(()=> resolve(window.FirebaseServices || null), timeoutMs);
    window.addEventListener('firebaseReady', ()=>{ clearTimeout(timer); resolve(window.FirebaseServices || null); }, { once:true });
  });
}

async function loadData(){
  // výchozí data + případná lokální záloha (pro okamžité zobrazení)
  state.reps = defaultReps();
  state.weeks = defaultWeeks();
  state.settings = defaultSettings();
  localBackupLoad();
  state.selectedRepId = state.reps[0] ? state.reps[0].id : null;
  state.loading = false;

  FB = await waitForFirebase(6000);
  if(!FB){
    state.cloudOk = false;
    addToast('Databáze není dostupná — běžíme v lokálním režimu.', 'error');
    return;
  }

  try{
    await FB.signInAnonymously(FB.auth);
    fbDocRef = FB.doc(FB.db, 'artifacts', FB.appId, 'public', 'data', 'sales_booster_2026', 'main');

    // Real-time synchronizace: každá uložená změna se okamžitě propíše všem otevřeným obrazovkám
    fbUnsub = FB.onSnapshot(fbDocRef, (snap) => {
      state.cloudOk = true;
      if(snap.exists()){
        // Nepřepisovat data, když admin právě edituje, nebo těsně po vlastním uložení
        const editing = state.isAdmin || state.showPinModal;
        const justWrote = (Date.now() - lastLocalWrite) < 1500;
        if(!editing && !justWrote){
          applyRemoteData(snap.data());
          render();
        } else if(!editing){
          // vlastní zápis se vrátil zpět — jen aktualizovat indikátor
          render();
        }
      } else {
        // první spuštění: založit dokument s aktuálními daty
        FB.setDoc(fbDocRef, { reps: state.reps, weeks: state.weeks, settings: state.settings });
      }
    }, (err) => {
      console.error('Firestore chyba:', err);
      state.cloudOk = false;
      render();
      addToast('Spojení s databází selhalo — změny se ukládají jen lokálně.', 'error');
    });
  }catch(e){
    console.error('Přihlášení k databázi selhalo:', e);
    state.cloudOk = false;
    addToast('Nepodařilo se připojit k databázi — lokální režim.', 'error');
  }
}

async function persist(silent){
  localBackupSave(); // záloha vždy
  if(FB && fbDocRef){
    try{
      lastLocalWrite = Date.now();
      await FB.setDoc(fbDocRef, { reps: state.reps, weeks: state.weeks, settings: state.settings });
      state.cloudOk = true;
      if(!silent) addToast('Uloženo do sdílené databáze — všichni teď vidí aktuální data.');
      return;
    }catch(e){
      console.error('Zápis do Firestore selhal:', e);
      state.cloudOk = false;
      if(!silent) addToast('Zápis do databáze selhal — data jsou zatím jen lokálně. Zkuste to znovu.', 'error');
      return;
    }
  }
  state.cloudOk = false;
  if(!silent) addToast('Databáze nedostupná — uloženo pouze lokálně v tomto prohlížeči.', 'error');
}

/* ============ HELPERS ============ */
function formatMoney(val, currency){
  val = Number(val)||0;
  if(currency === 'EUR') return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(val);
  return new Intl.NumberFormat('cs-CZ',{style:'currency',currency:'CZK',maximumFractionDigits:0}).format(val);
}
function formatSecondary(val, currency){
  val = Number(val)||0;
  if(currency === 'EUR') return formatMoney(val*RATE, 'CZK');
  return formatMoney(Math.round(val/RATE), 'EUR');
}
function toCZK(val, currency){ val = Number(val)||0; return currency === 'EUR' ? val*RATE : val; }

// Dvoupásmový model: základ 20 %, od "stribro" 25 %, od "zlato" 30 %.
function tierInfo(turnover, stribro, zlato){
  if(turnover >= zlato) return {tier:'zlato', rate:30, label:'Zlaté pásmo · 30 % provize', badge:'bg-yellow-50 text-yellow-700 border-yellow-300/50', ring:'ring-4 ring-yellow-400/40', dot:'bg-yellow-400'};
  if(turnover >= stribro) return {tier:'stribro', rate:25, label:'Stříbrné pásmo · 25 % provize', badge:'bg-slate-100 text-slate-700 border-slate-300/50', ring:'ring-4 ring-slate-400/40', dot:'bg-slate-400'};
  return {tier:'zaklad', rate:20, label:'Základní sazba · 20 % provize', badge:'bg-slate-50 text-slate-500 border-slate-200/60', ring:'ring-4 ring-slate-200/50', dot:'bg-slate-300'};
}

function monthData(rep, month){
  return rep[month] || {turnover:0,newClients:0,stribro:100000,zlato:200000};
}

function repById(id){ return state.reps.find(r=>r.id===id); }

/* ============ AVATARY: výchozí fotka + čištění vloženého odkazu ============ */
const DEFAULT_AVATAR = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=200';

// Ořeže mezery/nové řádky z vloženého odkazu a převede odkazy na stránku
// z běžných fotohostingů na přímý odkaz na obrázek.
function cleanAvatarUrl(raw){
  let u = (raw || '').trim();
  if(!u) return '';
  // Google Drive sdílený odkaz -> přímý náhled
  let m = u.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
  if(m) return 'https://drive.google.com/uc?export=view&id=' + m[1];
  // Dropbox náhledová stránka -> přímý soubor
  if(u.includes('dropbox.com')) return u.replace('?dl=0','?raw=1').replace('&dl=0','&raw=1');
  // Imgur stránka obrázku -> přímý obrázek
  m = u.match(/^https?:\/\/imgur\.com\/([A-Za-z0-9]+)$/);
  if(m) return 'https://i.imgur.com/' + m[1] + '.png';
  return u;
}

function avatarSrc(rep){
  return escapeHtml(cleanAvatarUrl(rep && rep.avatar) || DEFAULT_AVATAR);
}

  return `${date} · ${time}`;
}

/* ============ STATS ============ */
function computeTeamStats(){
  let totalCZK = 0, topCommCZK = -1, topCommRep = null, topHunterVal = -1, topHunterRep = null, rateSum = 0;
  state.reps.forEach(rep=>{
    const d = monthData(rep, state.activeMonth);
    totalCZK += toCZK(d.turnover, rep.currency);
    const t = tierInfo(d.turnover, d.stribro, d.zlato);
    rateSum += t.rate;
    const commNative = d.turnover * (t.rate/100);
    const commCZK = toCZK(commNative, rep.currency);
    if(commCZK > topCommCZK){ topCommCZK = commCZK; topCommRep = {...rep, amountNative: commNative, rate: t.rate}; }
    if(d.newClients > topHunterVal){ topHunterVal = d.newClients; topHunterRep = rep; }
  });
  const avgComm = state.reps.length ? (rateSum/state.reps.length).toFixed(1) : '20.0';
  return { totalCZK, totalEUR: Math.round(totalCZK/RATE), topCommRep, topHunterRep, topHunterVal, avgComm };
}

  const turnover = state.simTurnovers[rep.id] !== undefined ? state.simTurnovers[rep.id] : realTurnover;
  const isSimulating = state.simTurnovers[rep.id] !== undefined;
  const t = tierInfo(turnover, d.stribro, d.zlato);
  const payout = Math.round(turnover * (t.rate/100));

  const stribroDone = turnover >= d.stribro;

function milestoneCard(title, target, currency, done, unlocked, progress, missing, tierPayout, currentPayout, isCurrent){
  // tierPayout = provize garantovaná při dosažení hranice pásma (v měně obchodníka)
  const extra = Math.max(tierPayout - currentPayout, 0);
  return `
  <div class="p-5 rounded-[22px] border transition-all shadow-sm ${done ? 'bg-emerald-50/40 border-emerald-100 text-emerald-800' : unlocked ? 'bg-orange-50/50 border-orange-200 ring-4 ring-orange-500/5 text-orange-950 active-milestone' : 'bg-slate-50 border-slate-100 text-slate-400 opacity-60'}">
    <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${done ? 'bg-emerald-100 text-emerald-600' : 'bg-orange-100 text-orange-600'}">🎯</div>
        <div>
          <span class="text-[10px] font-black uppercase tracking-wider">${title}${isCurrent ? ' · <span class="text-orange-600">VAŠE AKTUÁLNÍ PÁSMO</span>' : ''}</span>
          <h5 class="text-sm font-black text-slate-800 mt-1">Cíl obratu: ${formatMoney(target, currency)}</h5>
          ${!done && unlocked ? `<p class="text-[11px] font-bold text-slate-500 mt-1">Při dosažení bude provize min. <strong class="text-slate-800">${formatMoney(tierPayout, currency)}</strong>${extra > 0 ? ` <span class="text-emerald-600">(+${formatMoney(extra, currency)} oproti teď)</span>` : ''}</p>` : ''}
          ${done ? `<p class="text-[11px] font-bold text-emerald-700 mt-1">Pásmo splněno — provize se počítá sazbou z celého obratu.</p>` : ''}
        </div>
      </div>
      <span class="text-xs font-extrabold bg-white border border-slate-200 px-3 py-1 rounded-xl shadow-sm whitespace-nowrap self-start sm:self-center">
        ${done ? 'Splněno! 🎉' : (!unlocked ? 'Uzamčeno' : `Chybí ${formatMoney(missing, currency)}`)}
      </span>
    </div>
    ${unlocked ? `<div class="mt-4 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner"><div class="h-full bg-gradient-to-r from-orange-500 to-amber-500 rounded-full" style="width:${progress}%"></div></div>` : ''}
  </div>`;
}

          <input type="number" id="new-rep-august-turnover" placeholder="Obrat" class="w-full p-2 border border-slate-200 rounded-xl text-xs bg-white">
          <input type="number" id="new-rep-august-clients" placeholder="Noví klienti" class="w-full p-2 border border-slate-200 rounded-xl text-xs bg-white">
          <input type="number" id="new-rep-august-stribro" placeholder="Hranice 25 % (stříbro)" value="160000" class="w-full p-2 border border-slate-200 rounded-xl text-xs bg-white">
          <input type="number" id="new-rep-august-zlato" placeholder="Hranice 30 % (zlato)" value="300000" class="w-full p-2 border border-slate-200 rounded-xl text-xs bg-white">
        </div>
      </div>
    </div>
    <button data-action="add-rep" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black p-4 rounded-2xl text-xs uppercase tracking-wider shadow-lg">Zařadit do boosteru</button>
  </div>`;
}

function weekRowHTML(w){
  return `
  <div class="grid grid-cols-1 sm:grid-cols-12 gap-3 items-center p-3 rounded-2xl bg-slate-50 border border-slate-100">
    <div class="sm:col-span-3 text-xs font-black text-slate-700">Týden ${w.week}<br><span class="font-semibold text-slate-400">${w.dateRange}</span></div>
    <div class="sm:col-span-3">
      <select data-week="${w.week}" data-field="status" class="w-full p-2 border border-slate-200 rounded-xl text-xs font-bold bg-white">
        <option value="pending" ${w.status==='pending'?'selected':''}>Nezačal</option>
        <option value="leading" ${w.status==='leading'?'selected':''}>Probíhá (lídr)</option>
        <option value="completed" ${w.status==='completed'?'selected':''}>Dokončen (vítěz)</option>
      </select>
    </div>
    <div class="sm:col-span-4">
      <select data-week="${w.week}" data-field="repId" class="w-full p-2 border border-slate-200 rounded-xl text-xs font-bold bg-white">
        <option value="">-- vyberte obchodníka --</option>
        ${state.reps.map(r=>`<option value="${r.id}" ${w.repId===r.id?'selected':''}>${escapeHtml(r.name)}</option>`).join('')}
      </select>
    </div>
    <div class="sm:col-span-2">
      <input type="number" data-week="${w.week}" data-field="clients" value="${w.clients}" placeholder="Klienti" class="w-full p-2 border border-slate-200 rounded-xl text-xs font-bold bg-white text-center">
    </div>
  </div>`;
}

/* ============ EVENTS ============ */
function bindGlobalEvents(){
  document.body.onclick = async (e) => {
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;

    if(action==='open-admin'){
      if(state.isAdmin){ state.isAdmin=false; render(); return; }
      state.showPinModal = true; state.pinValue=''; state.pinError=''; render();
      setTimeout(()=>{ const i=document.getElementById('pin-input'); if(i) i.focus(); }, 50);
    }
    else if(action==='close-pin'){ state.showPinModal=false; render(); }
    else if(action==='dismiss-toast'){ state.toasts = state.toasts.filter(t=>t.id!==el.dataset.id); renderToasts(); }
    else if(action==='select-rep'){ state.selectedRepId = el.dataset.id; render(); }
    else if(action==='set-month'){ state.activeMonth = el.dataset.month; userPickedMonth = true; render(); }
    else if(action==='reset-sim'){ delete state.simTurnovers[state.selectedRepId]; render(); }
    else if(action==='admin-close'){ await persist(true); state.isAdmin=false; state.showResetConfirm=false; render(); addToast('Administrace uzavřena, změny uloženy.'); }
    else if(action==='admin-save'){ await persist(false); }
    else if(action==='delete-rep'){
      const rep = repById(el.dataset.id);
      if(rep && confirm(`Opravdu odstranit obchodníka ${rep.name}?`)){
        state.reps = state.reps.filter(r=>r.id!==el.dataset.id);
        if(state.selectedRepId === el.dataset.id){ state.selectedRepId = state.reps[0] ? state.reps[0].id : null; }
        await persist(true);
        render();
        addToast(`Obchodník ${rep.name} byl odstraněn.`, 'error');
      }
    }
    else if(action==='add-rep'){
      const name = document.getElementById('new-rep-name').value.trim();
      if(!name){ addToast('Zadejte prosím jméno obchodníka.', 'error'); return; }
      const avatar = cleanAvatarUrl(document.getElementById('new-rep-avatar').value) || DEFAULT_AVATAR;
      const currency = document.getElementById('new-rep-currency').value;
      const id = uniqueId(name);
      const newRep = {
        id, name, avatar, currency,
        july: {
          turnover: Number(document.getElementById('new-rep-july-turnover').value)||0,
          newClients: Number(document.getElementById('new-rep-july-clients').value)||0,
          stribro: Number(document.getElementById('new-rep-july-stribro').value)||0,
          zlato: Number(document.getElementById('new-rep-july-zlato').value)||0,
        },
        august: {
          turnover: Number(document.getElementById('new-rep-august-turnover').value)||0,
          newClients: Number(document.getElementById('new-rep-august-clients').value)||0,
          stribro: Number(document.getElementById('new-rep-august-stribro').value)||0,
          zlato: Number(document.getElementById('new-rep-august-zlato').value)||0,
        }
      };
      state.reps.push(newRep);
      state.selectedRepId = id;
      await persist(true);
      render();
      addToast(`Obchodník ${name} byl přidán do boosteru.`);
    }
    else if(action==='reset-open'){ state.showResetConfirm = true; render(); }
    else if(action==='reset-cancel'){ state.showResetConfirm = false; render(); }
    else if(action==='reset-confirm'){
      state.reps = defaultReps();
      state.weeks = defaultWeeks();
      state.settings = defaultSettings();
      state.selectedRepId = state.reps[0].id;
      state.showResetConfirm = false;
      await persist(true);
      render();
      addToast('Data byla vrácena do výchozího stavu.');
    }
  };

  document.body.onsubmit = async (e) => {
    if(e.target.id === 'pin-form'){
      e.preventDefault();
      const val = document.getElementById('pin-input').value;
      if(val === ADMIN_PIN){
        state.isAdmin = true; state.showPinModal = false; state.pinError=''; render();
      } else {
        state.pinError = 'Nesprávný PIN. Zkuste to znovu.'; render();
        setTimeout(()=>{ const i=document.getElementById('pin-input'); if(i) i.focus(); }, 50);
      }
    }
  };

  // Admin field inputs — mutate state without full re-render (preserve focus)
  document.body.addEventListener('input', (e) => {
    const t = e.target;
    if(t.dataset && t.dataset.rep && t.dataset.field && t.dataset.month){
      const rep = repById(t.dataset.rep);
      if(!rep) return;
      const month = t.dataset.month, field = t.dataset.field;
      if(!rep[month]) rep[month] = {turnover:0,newClients:0,stribro:0,zlato:0};
      rep[month][field] = (field==='turnover'||field==='newClients'||field==='stribro'||field==='zlato') ? Number(t.value)||0 : t.value;
      if(field==='newClients'){
        const badge = document.getElementById('total-clients-' + rep.id);
        if(badge){
          const total = (Number(monthData(rep,'july').newClients)||0) + (Number(monthData(rep,'august').newClients)||0);
          badge.textContent = '🎯 Celkem za léto: ' + total + ' klientů';
        }
      }
    } else if(t.dataset && t.dataset.rep && t.dataset.field && !t.dataset.month){
      const rep = repById(t.dataset.rep);
      if(!rep) return;
      if(t.dataset.field === 'avatar'){
        rep.avatar = cleanAvatarUrl(t.value);
        // živý náhled fotky přímo v kartě administrace
        const preview = document.querySelector(`[data-avatar-preview="${rep.id}"]`);
        if(preview){
          preview.onerror = function(){ this.onerror = null; this.src = DEFAULT_AVATAR; };
          preview.src = rep.avatar || DEFAULT_AVATAR;
        }
      } else {
        rep[t.dataset.field] = t.value;
      }
    } else if(t.dataset && t.dataset.week && t.dataset.field){
      const w = state.weeks.find(w=>w.week==t.dataset.week);
      if(!w) return;
      const field = t.dataset.field;
      w[field] = field==='clients' ? Number(t.value)||0 : t.value;
    } else if(t.dataset && t.dataset.setting){
      state.settings[t.dataset.setting] = Number(t.value)||0;
    } else if(t.id === 'sim-slider'){
      handleSliderInput(Number(t.value));
    }
  });
}

function uniqueId(name){
  let base = uid(name), id = base, n = 1;
  while(repById(id)){ id = base + '-' + (++n); }
  return id;
}

function handleSliderInput(value){
  const rep = repById(state.selectedRepId);
  if(!rep) return;
  state.simTurnovers[rep.id] = value;
  const d = monthData(rep, state.activeMonth);
  const t = tierInfo(value, d.stribro, d.zlato);
  const payout = Math.round(value * (t.rate/100));

  const label = document.getElementById('sim-turnover-label');
  if(label) label.textContent = formatMoney(value, rep.currency);
  const rateEl = document.getElementById('sim-rate');
  if(rateEl) rateEl.textContent = t.rate + '%';
  const payoutEl = document.getElementById('sim-payout');
  if(payoutEl) payoutEl.textContent = formatMoney(payout, rep.currency);
  const missingEl = document.getElementById('sim-missing');
  if(missingEl){
    let txt = '';
    if(t.tier==='zaklad'){
      const stribroPayout = Math.round(d.stribro*0.25);
      txt = `Ještě ${formatMoney(d.stribro-value, rep.currency)} obratu a provize vzroste na 25 % — o ${formatMoney(stribroPayout-payout, rep.currency)} víc než teď.`;
    } else if(t.tier==='stribro'){
      const zlatoPayout = Math.round(d.zlato*0.30);
      txt = `Ještě ${formatMoney(d.zlato-value, rep.currency)} obratu a provize vzroste na 30 % — o ${formatMoney(zlatoPayout-payout, rep.currency)} víc než teď.`;
    } else {
      txt = 'Jste na nejvyšší možné sazbě 30 %!';
    }
    missingEl.textContent = txt;
  }

  // update thermometer + milestones + compare cards by re-rendering jen detail panel (debounced)
  clearTimeout(window.__simRenderTimer);
  window.__simRenderTimer = setTimeout(()=>{
    const panel = document.getElementById('detail-panel');
    if(panel) panel.innerHTML = detailHTML();
  }, 120);
}

/* ============ BOOT ============ */
(async function boot(){
  document.getElementById('app').innerHTML = `<div class="min-h-screen flex items-center justify-center text-slate-400 font-bold">Načítání dat týmu…</div>`;
  await loadData();
  render();
})();
</script>
